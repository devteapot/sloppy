# Endpoint routing and env-backed credentials are trusted home configuration.
# Put this block in ~/.sloppy/config.yaml, not in a workspace/project layer:
#
# llm:
#   endpoints:
#     litellm:
#       protocol: openai-chat
#       baseUrl: https://sloppy-mba.local:8001/v1
#       auth:
#         type: env
#         env: LITELLM_API_KEY
#       models:
#         <litellm-model>: {}

llm:
  defaultProfileId: litellm-main
  profiles:
    - id: litellm-main
      label: LiteLLM Main
      endpointId: litellm
      model: <litellm-model>
  # To use a ChatGPT/Codex subscription natively, run `codex login` first:
  # defaultProfileId: codex-native
  # profiles:
  #   - id: codex-native
  #     endpointId: openai-codex
  #     model: gpt-5.5
  #     reasoningEffort: low
  # To run Grok through Sloppy's native model/tool loop:
  # defaultProfileId: grok-native
  # profiles:
  #   - id: grok-native
  #     endpointId: xai
  #     model: grok-4.5
  #     reasoningEffort: high
  # To run Grok Build as the external ACP session agent, add this profile and
  # the `grok` adapter below:
  # profiles:
  #   - kind: session-agent
  #     id: grok-build
  #     adapterId: grok
  #     model: grok-4.5

session:
  persistSnapshots: true
  persistenceDir: .sloppy/sessions

plugins:
  meta-runtime:
    enabled: true
  messaging:
    enabled: true
  delegation:
    enabled: true
    acp:
      enabled: true
      defaultTimeoutMs: 600000
      adapters:
        claude:
          command: ["claude-agent-acp"]
          envAllowlist: ["ANTHROPIC_API_KEY"]
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
        codex:
          command: ["codex-acp"]
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
        grok:
          command: ["grok", "agent", "stdio"]
          envAllowlist: ["XAI_API_KEY"]
          authMethodPreferences:
            - id: xai.api_key
              whenEnv: XAI_API_KEY
            - id: cached_token
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
  mcp:
    enabled: true
    connectOnStart: true
    servers:
      local-demo:
        transport: stdio
        command: ["bunx", "my-mcp-server"]
        cwd: .
        envAllowlist: ["MY_MCP_TOKEN"]
      hosted-demo:
        transport: streamableHttp
        url: https://mcp.example.test/mcp
        headers:
          x-api-key: <token>
  a2a:
    enabled: true
    fetchOnStart: true
    agents:
      planner:
        cardUrl: https://agent.example/.well-known/agent-card.json
        bearerTokenEnv: A2A_AGENT_TOKEN
      local-bridge:
        url: https://agent.example/a2a/rpc
        protocolVersion: "1.0"
  workspaces:
    enabled: true
  # Voice: speech-to-text + text-to-speech. Each modality is independent — you
  # can configure STT only, TTS only, or both. Cloud endpoints authenticate via
  # an env var (or a stored credential); local self-hosted servers need only a
  # baseUrl plus `auth: { type: none }`, exactly like a local LLM endpoint.
  voice:
    enabled: true
    stt:
      endpoints:
        # Local, OpenAI-compatible (faster-whisper-server / speaches).
        faster-whisper:
          protocol: openai-transcriptions
          baseUrl: http://localhost:8000/v1
          auth:
            type: none
          models:
            Systran/faster-whisper-base: {}
        # Cloud (uncomment and set OPENAI_API_KEY to use):
        # openai-stt:
        #   protocol: openai-transcriptions
        #   auth: { type: env, env: OPENAI_API_KEY }
      profiles:
        - id: stt-local
          label: Local Whisper
          endpointId: faster-whisper
          model: Systran/faster-whisper-base
      defaultProfileId: stt-local
    tts:
      endpoints:
        # Local, OpenAI-compatible (kokoro-fastapi / openedai-speech).
        kokoro:
          protocol: openai-speech
          baseUrl: http://localhost:8880/v1
          auth:
            type: none
          model: kokoro
          voices:
            af_bella: { format: wav }
        # Cloud (uncomment and set ELEVENLABS_API_KEY to use):
        # elevenlabs:
        #   protocol: elevenlabs
        #   auth: { type: env, env: ELEVENLABS_API_KEY }
      profiles:
        - id: tts-local
          label: Kokoro (local)
          endpointId: kokoro
          voice: af_bella
          autospeak: true # speak completed assistant turns (client plays the audio)
      defaultProfileId: tts-local
      # When using the voice-conversation loop below, set autospeak: false on the
      # active profile — the loop synthesizes replies itself, so autospeak would
      # double up the TTS call.

  # Hands-free voice conversation loop layered on the voice provider:
  # capture (VAD) → /stt → agent turn → /tts → playback, animating the robot head
  # while it speaks. Prefer the LOCAL stt/tts endpoints above so the voice network
  # policy auto-allows (a hands-free loop would otherwise block on approval each turn).
  voice-conversation:
    enabled: false
    audio:
      backend: host # `host` = laptop mic/speaker (dev / pre-hardware); `robot` = reachy mic/speaker
      silenceStopSeconds: 1.2 # stop capture after this much trailing silence (host VAD)
      maxUtteranceSeconds: 30
      providerId: reachy # robot provider id used when backend: robot
      # Optional command overrides (defaults target macOS: sox capture, afplay playback):
      # captureCommand: ["sox", "-d", "-c", "1", "-r", "16000", "-t", "wav", "-", "silence", "1", "0.1", "3%", "1", "1.2", "3%"]
      # playbackCommand: ["afplay", "{file}"]
    embodiment:
      enabled: true # runtime-driven head/antenna motion during the reply (visible in the MuJoCo sim)
      providerId: reachy

workspaces:
  activeWorkspaceId: sloppy
  activeProjectId: runtime
  items:
    sloppy:
      name: Sloppy
      root: ~/dev/sloppy
      configPath: .sloppy/config.yaml
      projects:
        runtime:
          name: Runtime
          root: .
          configPath: .sloppy/config.yaml
