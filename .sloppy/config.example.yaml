llm:
  provider: openai
  model: <litellm-model>
  apiKeyEnv: LITELLM_API_KEY
  baseUrl: http://sloppy-mba.local:8001/v1
  # To use a ChatGPT/Codex subscription natively, run `codex login` first:
  # provider: openai-codex
  # model: gpt-5.5
  # reasoningEffort: low

session:
  persistSnapshots: true
  persistenceDir: .sloppy/sessions

providers:
  builtin:
    metaRuntime: true
    messaging: true
    delegation: true
  delegation:
    acp:
      enabled: true
      defaultTimeoutMs: 600000
      adapters:
        claude:
          command: ["claude-agent-acp"]
          envAllowlist: ["ANTHROPIC_API_KEY"]
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
        codex:
          command: ["codex-acp"]
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
