llm:
  provider: openai
  model: <litellm-model>
  apiKeyEnv: LITELLM_API_KEY
  baseUrl: http://sloppy-mba.local:8001/v1

providers:
  builtin:
    metaRuntime: true
    messaging: true
    delegation: true
  delegation:
    acp:
      enabled: true
      defaultTimeoutMs: 600000
      adapters:
        claude:
          command: ["claude-agent-acp"]
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
        codex:
          command: ["codex-acp"]
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
    cli:
      enabled: true
      defaultTimeoutMs: 600000
      adapters:
        codex:
          command: ["codex", "exec", "--ephemeral", "--sandbox", "read-only"]
