# Endpoint routing and env-backed credentials are trusted home configuration.
# Put this block in ~/.sloppy/config.yaml, not in a workspace/project layer:
#
# llm:
#   endpoints:
#     litellm:
#       protocol: openai-chat
#       baseUrl: https://sloppy-mba.local:8001/v1
#       auth:
#         type: env
#         env: LITELLM_API_KEY
#       models:
#         <litellm-model>: {}

llm:
  defaultProfileId: litellm-main
  profiles:
    - id: litellm-main
      label: LiteLLM Main
      endpointId: litellm
      model: <litellm-model>
  # To use a ChatGPT/Codex subscription natively, run `codex login` first:
  # defaultProfileId: codex-native
  # profiles:
  #   - id: codex-native
  #     endpointId: openai-codex
  #     model: gpt-5.5
  #     reasoningEffort: low
  # To run Grok through Sloppy's native model/tool loop:
  # defaultProfileId: grok-native
  # profiles:
  #   - id: grok-native
  #     endpointId: xai
  #     model: grok-4.5
  #     reasoningEffort: high
  # To run Grok Build as the external ACP session agent, add this profile and
  # the `grok` adapter below:
  # profiles:
  #   - kind: session-agent
  #     id: grok-build
  #     adapterId: grok
  #     model: grok-4.5

session:
  persistSnapshots: true
  persistenceDir: .sloppy/sessions

plugins:
  meta-runtime:
    enabled: true
  messaging:
    enabled: true
  delegation:
    enabled: true
    acp:
      enabled: true
      defaultTimeoutMs: 600000
      adapters:
        claude:
          command: ["claude-agent-acp"]
          envAllowlist: ["ANTHROPIC_API_KEY"]
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
        codex:
          command: ["codex-acp"]
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
        grok:
          command: ["grok", "agent", "stdio"]
          envAllowlist: ["XAI_API_KEY"]
          authMethodPreferences:
            - id: xai.api_key
              whenEnv: XAI_API_KEY
            - id: cached_token
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
  mcp:
    enabled: true
    connectOnStart: true
    servers:
      local-demo:
        transport: stdio
        command: ["bunx", "my-mcp-server"]
        cwd: .
        envAllowlist: ["MY_MCP_TOKEN"]
      hosted-demo:
        transport: streamableHttp
        url: https://mcp.example.test/mcp
        headers:
          x-api-key: <token>
  a2a:
    enabled: true
    fetchOnStart: true
    agents:
      planner:
        cardUrl: https://agent.example/.well-known/agent-card.json
        bearerTokenEnv: A2A_AGENT_TOKEN
      local-bridge:
        url: https://agent.example/a2a/rpc
        protocolVersion: "1.0"
  workspaces:
    enabled: true

workspaces:
  activeWorkspaceId: sloppy
  activeProjectId: runtime
  items:
    sloppy:
      name: Sloppy
      root: ~/dev/sloppy
      configPath: .sloppy/config.yaml
      projects:
        runtime:
          name: Runtime
          root: .
          configPath: .sloppy/config.yaml
