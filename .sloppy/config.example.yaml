llm:
  provider: openai
  model: <litellm-model>
  apiKeyEnv: LITELLM_API_KEY
  baseUrl: http://sloppy-mba.local:8001/v1
  # To use a ChatGPT/Codex subscription natively, run `codex login` first:
  # provider: openai-codex
  # model: gpt-5.5
  # reasoningEffort: low

session:
  persistSnapshots: true
  persistenceDir: .sloppy/sessions

providers:
  builtin:
    metaRuntime: true
    messaging: true
    delegation: true
    mcp: true
    workspaces: true
    a2a: true
  mcp:
    connectOnStart: true
    servers:
      local-demo:
        transport: stdio
        command: ["bunx", "my-mcp-server"]
        cwd: .
        envAllowlist: ["MY_MCP_TOKEN"]
      hosted-demo:
        transport: streamableHttp
        url: https://mcp.example.test/mcp
        headers:
          x-api-key: <token>
  a2a:
    fetchOnStart: true
    agents:
      planner:
        cardUrl: https://agent.example/.well-known/agent-card.json
        bearerTokenEnv: A2A_AGENT_TOKEN
      local-bridge:
        url: https://agent.example/a2a/rpc
        protocolVersion: "1.0"
  delegation:
    acp:
      enabled: true
      defaultTimeoutMs: 600000
      adapters:
        claude:
          command: ["claude-agent-acp"]
          envAllowlist: ["ANTHROPIC_API_KEY"]
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true
        codex:
          command: ["codex-acp"]
          capabilities:
            spawn_allowed: true
            shell_allowed: true
            network_allowed: true
            filesystem_reads_allowed: true
            filesystem_writes_allowed: true

workspaces:
  activeWorkspaceId: sloppy
  activeProjectId: runtime
  items:
    sloppy:
      name: Sloppy
      root: ~/dev/sloppy
      configPath: .sloppy/config.yaml
      projects:
        runtime:
          name: Runtime
          root: .
          configPath: .sloppy/config.yaml
        dashboard:
          name: Dashboard
          root: apps/dashboard
          configPath: .sloppy/config.yaml
